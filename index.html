<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Advanced AI Publishing Engine</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f5f6fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 95%; max-width: 1200px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .api-config { display: flex; gap: 10px; align-items: center; background: #fff9db; padding: 10px 15px; border-radius: 8px; border: 1px solid #fab005; }
        input[type="password"] { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 250px; }
        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        textarea { width: 100%; height: 500px; padding: 20px; border: 1px solid #e1e8ed; border-radius: 12px; font-size: 15px; line-height: 1.7; box-sizing: border-box; }
        .preview-zone { height: 500px; background: #222; border-radius: 12px; position: relative; overflow: hidden; perspective: 1500px; color: white; }
        .layer { position: absolute; transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); padding: 30px; box-sizing: border-box; }
        .layer-paper { background: white; z-index: 1; width: 85%; height: 90%; top: 5%; left: 7.5%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .layer-content { z-index: 3; width: 75%; top: 10%; left: 12.5%; color: #333; font-size: 14px; line-height: 1.8; white-space: pre-wrap; overflow-y: auto; height: 80%; }
        .control-panel { margin-top: 30px; display: flex; flex-direction: column; gap: 20px; }
        .style-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .option-card { background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 10px; cursor: pointer; text-align: center; }
        .option-card.active { border-color: var(--accent); background: #e7f5ff; border-width: 2px; }
        button.btn-main { padding: 15px 40px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; align-self: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 24px;">AI Publishing Engine</h1>
            <p style="margin:5px 0 0; color: #7f8c8d;">지능형 원고 분석 및 2.5D 레이아웃 자동화</p>
        </div>
        <div class="api-config">
            <label style="font-size: 13px; font-weight: bold;">Gemini API KEY:</label>
            <input type="password" id="apiKey" placeholder="키를 입력하세요">
        </div>
    </div>

    <div class="main-layout">
        <textarea id="rawInput" placeholder="이곳에 원고를 붙여넣으세요."></textarea>
        <div class="preview-zone">
            <div class="layer layer-paper" id="p-bg"></div>
            <div class="layer layer-content" id="p-text">분석 버튼을 누르면 AI 교정 및 배치가 시작됩니다.</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="style-options">
            <div class="option-card" id="opt-2D" onclick="setStyle('2D')"><strong>[2D] 표준 평면</strong></div>
            <div class="option-card" id="opt-2.5D-S" onclick="setStyle('2.5D-S')"><strong>[2.5D] 세미 입체</strong></div>
            <div class="option-card" id="opt-2.5D-H" onclick="setStyle('2.5D-H')"><strong>[2.5D] 고입체</strong></div>
        </div>
        <button class="btn-main" onclick="processDocument()">분석 및 레이아웃 생성</button>
    </div>
</div>

<script>
    let currentStyle = '2D';

    function setStyle(style) {
        currentStyle = style;
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
        document.getElementById('opt-' + style).classList.add('active');
        applyVisualLayout();
    }

    async function processDocument() {
        const apiKey = document.getElementById('apiKey').value.trim(); // 공백 자동 제거
        const text = document.getElementById('rawInput').value;

        if (!apiKey) return alert("API Key를 입력해주세요.");
        if (!text) return alert("원고를 입력해주세요.");

        document.getElementById('p-text').innerText = "AI 분석 중... 잠시만 기다려주세요.";

        try {
            // 최신 모델명인 gemini-1.5-flash 사용
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `다음 원고의 오타와 띄어쓰기를 교정하고 가독성 좋게 다듬어줘. 핵심 내용은 유지해: \n\n${text}` }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                // 상세 에러 메시지 출력
                throw new Error(data.error.message);
            }

            const correctedText = data.candidates[0].content.parts[0].text;
            document.getElementById('p-text').innerText = correctedText;
            applyVisualLayout();
            alert("분석이 완료되었습니다!");

        } catch (error) {
            console.error(error);
            alert("오류 발생: " + error.message + "\n\n키가 정확한지 확인해 주세요.");
            document.getElementById('p-text').innerText = "오류로 인해 중단되었습니다.";
        }
    }

    function applyVisualLayout() {
        const bg = document.getElementById('p-bg');
        const txt = document.getElementById('p-text');
        if (currentStyle === '2D') {
            bg.style.transform = "none";
            txt.style.transform = "none";
        } else if (currentStyle === '2.5D-S') {
            bg.style.transform = "rotateY(5deg) translateZ(-20px)";
            txt.style.transform = "translateZ(30px)";
        } else if (currentStyle === '2.5D-H') {
            bg.style.transform = "rotateY(15deg) rotateX(5deg) translateZ(-50px)";
            txt.style.transform = "translateZ(100px) rotateY(-5deg)";
        }
    }
    setStyle('2D'); // 초기화
</script>

</body>
</html>
