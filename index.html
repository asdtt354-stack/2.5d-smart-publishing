<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EAIM Pro Engine (2.5-Flash Custom)</title>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f5f6fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .app-container { width: 98%; max-width: 1600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* 레이아웃 구조 */
        .main-layout { display: grid; grid-template-columns: 320px 1fr 1.2fr; gap: 20px; margin-top: 15px; }

        /* 설정 패널 스타일 */
        .config-panel { background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; overflow-y: auto; height: 750px; }
        .config-header { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: var(--primary); display: flex; justify-content: space-between; }
        .config-group { margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .config-group label { font-size: 12px; color: #4a5568; }
        .config-group input { width: 60px; padding: 5px; border: 1px solid #cbd5e0; border-radius: 4px; text-align: center; }
        
        .hwp-preset-btn { width: 100%; padding: 8px; background: #e2e8f0; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .hwp-preset-btn:hover { background: #cbd5e0; }

        /* 2.5D 프리뷰 */
        .preview-zone { height: 750px; background: #333; border-radius: 10px; perspective: 2000px; display: flex; justify-content: center; align-items: center; position: relative; }
        #hwpPage { background: white; position: relative; transition: 0.5s; box-shadow: 0 30px 60px rgba(0,0,0,0.5); transform: rotateY(15deg) rotateX(5deg); display: flex; flex-direction: column; }

        /* 본문 영역 */
        .page-content { flex: 1; overflow-y: auto; color: #222; word-break: break-all; text-align: justify; }
        
        /* 쪽 번호 (꼬리말 영역) */
        #pageFooter { position: absolute; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; }

        .btn-run { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #222; padding-bottom:10px;">
        <h2 style="margin:0;">EAIM Publishing Engine <span style="color:#3498db; font-size:0.6em;">2.5-Flash Custom</span></h2>
        <div style="background:#fff9db; padding:5px 15px; border-radius:8px; display:flex; gap:10px; align-items:center;">
            <input type="password" id="key" placeholder="API Key" style="width:150px;">
            <button onclick="checkKey()">연결</button>
            <div id="dot" style="width:10px; height:10px; border-radius:50%; background:#ccc;"></div>
        </div>
    </div>

    <div class="main-layout">
        <div class="config-panel">
            <div class="config-header">여백 설정 (mm)</div>
            <button class="hwp-preset-btn" onclick="applyHWPPreset()">HWP 표준값 자동 적용</button>
            
            <div class="config-group"><label>위쪽 여백</label><input type="number" id="mTop" value="20" oninput="updateLayout()"></div>
            <div class="config-group"><label>머리말</label><input type="number" id="mHeader" value="15" oninput="updateLayout()"></div>
            <div class="config-group"><label>왼쪽 여백</label><input type="number" id="mLeft" value="30" oninput="updateLayout()"></div>
            <div class="config-group"><label>오른쪽 여백</label><input type="number" id="mRight" value="30" oninput="updateLayout()"></div>
            <div class="config-group"><label>꼬리말</label><input type="number" id="mFooter" value="15" oninput="updateLayout()"></div>
            <div class="config-group"><label>아래쪽 여백</label><input type="number" id="mBottom" value="15" oninput="updateLayout()"></div>
            
            <hr style="border:0; border-top:1px solid #e2e8f0; margin:15px 0;">
            
            <div class="config-group">
                <label>용지 종류</label>
                <select id="pSize" onchange="updateLayout()" style="padding:5px;">
                    <option value="A4">A4 (설명서)</option>
                    <option value="B4">B4 (시험지)</option>
                </select>
            </div>
            <div class="config-group">
                <label>글자 크기 (px)</label>
                <input type="number" id="fSize" value="15" oninput="updateLayout()">
            </div>
            
            <button class="btn-run" id="runBtn" onclick="runAI()" disabled style="margin-top:20px;">2.5-Flash 교정/배치</button>
        </div>

        <div style="border:2px solid #ddd; border-radius:10px; background:#fff;">
            <textarea id="input" style="width:100%; height:100%; border:none; padding:15px; resize:none;" placeholder="원고를 입력하세요..."></textarea>
        </div>

        <div class="preview-zone">
            <div id="hwpPage">
                <div id="output" class="page-content">여백 설정을 변경하면 즉시 반영됩니다.</div>
                <div id="pageFooter">- 1 -</div>
            </div>
        </div>
    </div>
</div>

<script>
    function applyHWPPreset() {
        document.getElementById('mTop').value = 20;
        document.getElementById('mHeader').value = 15;
        document.getElementById('mLeft').value = 30;
        document.getElementById('mRight').value = 30;
        document.getElementById('mFooter').value = 15;
        document.getElementById('mBottom').value = 15;
        updateLayout();
    }

    function updateLayout() {
        const page = document.getElementById('hwpPage');
        const out = document.getElementById('output');
        const footer = document.getElementById('pageFooter');
        
        const size = document.getElementById('pSize').value;
        const mt = document.getElementById('mTop').value;
        const mh = document.getElementById('mHeader').value;
        const ml = document.getElementById('mLeft').value;
        const mr = document.getElementById('mRight').value;
        const mf = document.getElementById('mFooter').value;
        const mb = document.getElementById('mBottom').value;
        const fs = document.getElementById('fSize').value;

        // 용지 크기
        if(size === "A4") { page.style.width = "420px"; page.style.height = "594px"; }
        else { page.style.width = "480px"; page.style.height = "680px"; }

        // 여백 적용 (CSS mm 단위 사용)
        // 위쪽 여백 = mTop + mHeader, 아래쪽 여백 = mBottom + mFooter
        const totalTop = parseFloat(mt) + parseFloat(mh);
        const totalBottom = parseFloat(mb) + parseFloat(mf);
        
        out.style.paddingTop = `${totalTop}mm`;
        out.style.paddingLeft = `${ml}mm`;
        out.style.paddingRight = `${mr}mm`;
        out.style.paddingBottom = `${totalBottom}mm`;
        out.style.fontSize = `${fs}px`;

        // 쪽 번호 위치 (꼬리말 수치에 따라 바닥에서 띄움)
        footer.style.bottom = `${parseFloat(mb)}mm`;
    }

    updateLayout();

    // 기존 키 확인 및 AI 로직 (2.5-Flash 고정)
    async function checkKey() {
        const k = document.getElementById('key').value.trim();
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: "hi"}]}]})
            });
            const data = await res.json();
            if(data.error) throw new Error();
            document.getElementById('dot').style.background = "#2ecc71";
            document.getElementById('runBtn').disabled = false;
            alert("2.5-Flash 엔진 연결 성공!");
        } catch(e) { alert("연결 실패"); }
    }

    async function runAI() {
        const k = document.getElementById('key').value.trim();
        const t = document.getElementById('input').value;
        const out = document.getElementById('output');
        out.innerText = "2.5-Flash 엔진 분석 중...";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: `너는 학교 행정 및 편집 전문가야. 다음 원고를 교정해줘: \n${t}`}]}]})
            });
            const data = await res.json();
            out.innerText = data.candidates[0].content.parts[0].text;
        } catch(e) { alert("분석 중 오류"); }
    }
</script>
</body>
</html>
