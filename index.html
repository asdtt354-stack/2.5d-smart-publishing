<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EAIM Global Engine (2.5-Flash)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
    <style>
        :root { --primary: #1a1a1a; --accent: #3498db; --bg: #f0f2f5; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .app-container { width: 98%; max-width: 1600px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .mode-selector { display: flex; gap: 10px; }
        .mode-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; background: white; font-weight: bold; font-size: 13px; }
        .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .main-layout { display: grid; grid-template-columns: 320px 1fr 1.2fr; gap: 25px; }

        .config-panel { background: #fff; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; height: 750px; overflow-y: auto; }
        .group-title { font-size: 14px; font-weight: bold; margin: 15px 0 8px; color: #333; border-left: 4px solid var(--accent); padding-left: 8px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 12px; }
        .input-row input, .input-row select { width: 75px; padding: 4px; border: 1px solid #cbd5e0; border-radius: 4px; }

        /* 커스텀 사이즈 입력창 애니메이션 */
        #customSizeArea { background: #f8fafc; padding: 10px; border-radius: 8px; margin-top: 5px; display: none; border: 1px dashed #3498db; }

        .preview-zone { height: 750px; background: #2c3e50; border-radius: 12px; perspective: 2500px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #printArea { 
            background: white; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
            transform: rotateY(12deg) rotateX(3deg); transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .content-body { flex: 1; overflow-y: auto; color: #111; line-height: 1.8; text-align: justify; word-break: break-all; }
        .page-num { position: absolute; bottom: 15px; width: 100%; text-align: center; font-weight: bold; color: #555; border-top: 1px solid #eee; padding-top: 5px; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; grid-column: span 2; font-size: 16px; }
        .btn-secondary { background: #eee; color: #333; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <h2>EAIM <span style="color:var(--accent)">Global Edition</span></h2>
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('ko')">한국어(HWP)</button>
            <button class="mode-btn" onclick="setMode('en')">English(Letter)</button>
            <button class="mode-btn" onclick="setMode('jp')">日本語(A5/B6)</button>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <input type="password" id="key" placeholder="API Key" style="padding:6px; border-radius:4px; border:1px solid #ddd;">
            <div id="dot" style="width:10px; height:10px; border-radius:50%; background:#ccc;"></div>
        </div>
    </div>

    <div class="main-layout">
        <div class="config-panel">
            <div class="group-title">용지 규격 설정</div>
            <div class="input-row">
                <label>용지 선택</label>
                <select id="pSize" onchange="toggleCustomSize()">
                    <option value="A4">A4 (Standard)</option>
                    <option value="Letter">Letter (US)</option>
                    <option value="B4">B4 (Exam)</option>
                    <option value="A5">A5 (Pocket)</option>
                    <option value="custom">Custom (직접 입력)</option>
                </select>
            </div>
            
            <div id="customSizeArea">
                <div class="input-row"><label>가로 (mm)</label><input type="number" id="cWidth" value="152" oninput="updateLayout()"></div>
                <div class="input-row"><label>세로 (mm)</label><input type="number" id="cHeight" value="225" oninput="updateLayout()"></div>
                <p style="font-size:10px; color:#3498db; margin:5px 0 0;">* 신국판: 152x225, 46판: 128x188</p>
            </div>
            
            <div class="group-title">수동 여백 설정 (mm)</div>
            <div class="input-row"><label>위쪽 + 머리말</label><div><input type="number" id="mTop" value="20"> + <input type="number" id="mHead" value="15"></div></div>
            <div class="input-row"><label>좌 | 우 여백</label><div><input type="number" id="mLeft" value="30"> | <input type="number" id="mRight" value="30"></div></div>
            <div class="input-row"><label>아래 + 꼬리말</label><div><input type="number" id="mBottom" value="15"> + <input type="number" id="mFoot" value="15"></div></div>
            
            <div class="group-title">글자 설정</div>
            <div class="input-row"><label>글자 크기 (px)</label><input type="number" id="fSize" value="15" oninput="updateLayout()"></div>

            <div class="action-btns">
                <button class="btn btn-primary" id="runBtn" onclick="runAI()">2.5-Flash 글로벌 분석 가동</button>
                <button class="btn btn-secondary" onclick="exportPDF()">💾 PDF 저장</button>
                <button class="btn btn-secondary" onclick="window.print()">🖨️ 인쇄</button>
            </div>
        </div>

        <div style="border:2px solid #ddd; border-radius:12px; background:#fff; overflow:hidden;">
            <textarea id="input" style="width:100%; height:100%; border:none; padding:15px; resize:none; font-size:14px;" placeholder="원고를 입력하세요. 설정한 판형에 맞춰 자동 배치됩니다."></textarea>
        </div>

        <div class="preview-zone">
            <div id="printArea">
                <div id="output" class="content-body">지능형 커스텀 판형 프리뷰...</div>
                <div class="page-num">- 1 -</div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentLang = 'ko';

    function toggleCustomSize() {
        const pSize = document.getElementById('pSize').value;
        const customArea = document.getElementById('customSizeArea');
        customArea.style.display = (pSize === 'custom') ? 'block' : 'none';
        updateLayout();
    }

    function setMode(lang) {
        currentLang = lang;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        if(lang === 'ko') {
            document.getElementById('pSize').value = "A4";
            applyPreset(20, 15, 30, 30, 15, 15);
        } else if(lang === 'en') {
            document.getElementById('pSize').value = "Letter";
            applyPreset(25, 0, 25, 25, 25, 0);
        } else if(lang === 'jp') {
            document.getElementById('pSize').value = "A5";
            applyPreset(15, 10, 20, 20, 15, 10);
        }
        toggleCustomSize();
    }

    function applyPreset(t, h, l, r, b, f) {
        document.getElementById('mTop').value = t;
        document.getElementById('mHead').value = h;
        document.getElementById('mLeft').value = l;
        document.getElementById('mRight').value = r;
        document.getElementById('mBottom').value = b;
        document.getElementById('mFoot').value = f;
    }

    function updateLayout() {
        const page = document.getElementById('printArea');
        const out = document.getElementById('output');
        const size = document.getElementById('pSize').value;
        
        // 용지 크기 물리적 계산 (1mm = 2px 기준 시각화)
        if(size === "custom") {
            const cw = document.getElementById('cWidth').value;
            const ch = document.getElementById('cHeight').value;
            page.style.width = (cw * 2) + "px"; 
            page.style.height = (ch * 2) + "px";
        } else {
            if(size === "A4") { page.style.width = "420px"; page.style.height = "594px"; }
            else if(size === "Letter") { page.style.width = "432px"; page.style.height = "558px"; }
            else if(size === "B4") { page.style.width = "514px"; page.style.height = "728px"; }
            else if(size === "A5") { page.style.width = "296px"; page.style.height = "420px"; }
        }

        const pt = parseFloat(document.getElementById('mTop').value) + parseFloat(document.getElementById('mHead').value);
        const pb = parseFloat(document.getElementById('mBottom').value) + parseFloat(document.getElementById('mFoot').value);
        
        out.style.padding = `${pt}mm ${document.getElementById('mRight').value}mm ${pb}mm ${document.getElementById('mLeft').value}mm`;
        out.style.fontSize = `${document.getElementById('fSize').value}px`;
    }

    async function runAI() {
        const k = document.getElementById('key').value;
        const t = document.getElementById('input').value;
        if(!k) return alert("API Key를 입력하세요.");
        
        document.getElementById('output').innerText = "2.5-Flash 엔진이 판형에 맞춰 정밀 분석 중...";
        
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: `너는 글로벌 출판 편집장이야. 다음 원고를 분석하고 교정해줘. 판형과 여백 규격을 고려해서 가독성을 극대화해줘. \n\n원고: ${t}`}]}]})
            });
            const data = await res.json();
            document.getElementById('output').innerText = data.candidates[0].content.parts[0].text;
            document.getElementById('dot').style.background = "#2ecc71";
        } catch(e) { alert("엔진 오류"); }
    }

    function exportPDF() {
        const element = document.getElementById('printArea');
        element.style.transform = "none";
        
        const size = document.getElementById('pSize').value;
        let pdfFormat;
        
        if(size === "custom") {
            const cw = document.getElementById('cWidth').value;
            const ch = document.getElementById('cHeight').value;
            pdfFormat = [parseFloat(cw), parseFloat(ch)];
        } else {
            pdfFormat = size.toLowerCase();
        }

        const opt = {
            margin: 0,
            filename: `EAIM_Custom_Publishing.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 3 },
            jsPDF: { unit: 'mm', format: pdfFormat, orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(element).save().then(() => {
            element.style.transform = "rotateY(12deg) rotateX(3deg)";
        });
    }

    updateLayout();
</script>
</body>
</html>
