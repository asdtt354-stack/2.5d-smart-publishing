<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EAIM Advanced Engine (2.5-Flash)</title>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --bg: #f5f6fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .app-container { width: 98%; max-width: 1500px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .main-layout { display: grid; grid-template-columns: 280px 1fr 1.2fr; gap: 20px; margin-top: 20px; }

        /* 설정 패널 */
        .config-panel { background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .config-group { margin-bottom: 15px; }
        .config-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        .config-group input, .config-group select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e0; }

        /* 출력 영역 (2.5D 입체) */
        .preview-zone { height: 750px; background: #333; border-radius: 10px; perspective: 2000px; display: flex; justify-content: center; align-items: center; position: relative; }
        
        #hwpPage { 
            background: white; position: relative; transition: 0.5s;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transform: rotateY(12deg) rotateX(4deg);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 본문 및 표 스타일 */
        .page-content { flex: 1; overflow-y: auto; color: #222; word-break: break-all; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        table, th, td { border: 1px solid #333; padding: 8px; text-align: center; }
        .img-placeholder { background: #f1f5f9; border: 2px dashed #cbd5e0; height: 150px; display: flex; align-items: center; justify-content: center; margin: 10px 0; color: #94a3b8; }

        /* [중요] 쪽 번호 하단 고정 */
        .page-footer { 
            position: absolute; bottom: 15px; left: 0; width: 100%;
            height: 30px; display: flex; justify-content: center; align-items: center;
            font-family: serif; font-weight: bold; font-size: 16px; color: #444;
            border-top: 1px solid #eee; background: white;
        }

        .btn-run { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #222; padding-bottom:15px;">
        <h2>EAIM Smart Publishing Engine <span style="color:#3498db; font-size:0.6em;">v2.5-Flash</span></h2>
        <div style="background:#fff9db; padding:8px 15px; border-radius:8px; display:flex; gap:10px; align-items:center;">
            <input type="password" id="key" placeholder="API Key" style="padding:5px;">
            <button onclick="checkKey()" style="cursor:pointer;">엔진 연결</button>
            <div id="dot" style="width:10px; height:10px; border-radius:50%; background:#ccc;"></div>
        </div>
    </div>

    <div class="main-layout">
        <div class="config-panel">
            <div class="config-group">
                <label>문서 모드</label>
                <select id="mode" onchange="updateLayout()">
                    <option value="exam">학교 정기고사 (B4)</option>
                    <option value="book">설명서/단행본 (A4)</option>
                </select>
            </div>
            <div class="config-group">
                <label>글자 크기 (px)</label>
                <input type="number" id="fontSize" value="15" oninput="updateLayout()">
            </div>
            <div class="config-group">
                <label>상하/좌우 여백 (mm)</label>
                <input type="number" id="mV" value="20" oninput="updateLayout()" style="width:45%;">
                <input type="number" id="mH" value="25" oninput="updateLayout()" style="width:45%;">
            </div>
            <button class="btn-run" id="runBtn" onclick="runAI()" disabled>2.5-Flash 분석 가동</button>
        </div>

        <div style="height:750px; border:2px solid #ddd; border-radius:10px;">
            <textarea id="input" style="width:100%; height:100%; border:none; padding:15px; resize:none;" placeholder="원고 내용을 입력하세요. 표 데이터가 포함되어도 좋습니다."></textarea>
        </div>

        <div class="preview-zone">
            <div id="hwpPage">
                <div id="output" class="page-content">원고를 분석하면 2.5D 레이아웃이 여기에 생성됩니다.</div>
                <div class="page-footer">- <span id="curPage">1</span> -</div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateLayout() {
        const page = document.getElementById('hwpPage');
        const output = document.getElementById('output');
        const mode = document.getElementById('mode').value;
        const fs = document.getElementById('fontSize').value;
        const mV = document.getElementById('mV').value;
        const mH = document.getElementById('mH').value;

        if(mode === "exam") {
            page.style.width = "480px"; page.style.height = "680px";
        } else {
            page.style.width = "420px"; page.style.height = "594px";
        }
        output.style.padding = `${mV}mm ${mH}mm ${mV}mm ${mH}mm`;
        output.style.fontSize = `${fs}px`;
    }
    updateLayout();

    async function checkKey() {
        const k = document.getElementById('key').value.trim();
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: "hi"}]}]})
            });
            const data = await res.json();
            if(data.error) throw new Error();
            document.getElementById('dot').style.background = "#2ecc71";
            document.getElementById('runBtn').disabled = false;
            alert("2.5-Flash 엔진 연결 성공!");
        } catch(e) { alert("연결 실패"); }
    }

    async function runAI() {
        const k = document.getElementById('key').value.trim();
        const t = document.getElementById('input').value;
        const out = document.getElementById('output');
        out.innerText = "데이터 분석 및 레이아웃 구성 중...";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    contents: [{parts: [{text: `너는 학교 시험지 및 교육 설명서 전문 편집장이야. 
                    1. 다음 원고를 분석해서 오타를 교정해.
                    2. 표 데이터가 있다면 반드시 HTML <table> 태그를 사용해서 표 형식으로 만들어줘.
                    3. 그림이나 이미지가 들어갈 법한 설명이 있다면 <div class='img-placeholder'>[이미지: 여기에 관련 삽화 배치]</div> 라고 표시해줘.
                    \n\n원고: ${t}`}]}]
                })
            });
            const data = await res.json();
            // HTML 형식으로 결과를 출력하기 위해 innerHTML 사용
            out.innerHTML = data.candidates[0].content.parts[0].text.replace(/```html|```/g, "");
        } catch(e) { alert("오류 발생"); }
    }
</script>
</body>
</html>
