<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EAIM Pro Engine (2.5-Flash)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
    <style>
        :root { --primary: #1a1a1a; --accent: #3498db; --bg: #f0f2f5; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .app-container { width: 98%; max-width: 1600px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .main-layout { display: grid; grid-template-columns: 320px 1fr 1.2fr; gap: 25px; }

        /* 설정 패널 */
        .config-panel { background: #fff; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; height: 800px; overflow-y: auto; }
        .group-title { font-size: 14px; font-weight: bold; margin: 15px 0 8px; color: #333; border-left: 4px solid var(--accent); padding-left: 8px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 12px; }
        .input-row input { width: 60px; padding: 4px; border: 1px solid #cbd5e0; border-radius: 4px; }

        /* 출력 영역 (2.5D 프리뷰) */
        .preview-zone { height: 800px; background: #2c3e50; border-radius: 12px; perspective: 2500px; overflow-y: auto; padding: 50px 0; }
        
        /* 실제 인쇄될 용지 스타일 */
        .paper { 
            background: white; margin: 0 auto 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative; transition: 0.5s; transform: rotateY(10deg);
            box-sizing: border-box; display: flex; flex-direction: column;
        }

        /* [핵심] 표 스타일 */
        .content-body { color: #111; line-height: 1.8; text-align: justify; word-break: break-all; width: 100%; height: 100%; }
        .content-body table { width: 100%; border-collapse: collapse; margin: 10px 0; border: 1.5px solid #000; }
        .content-body th, .content-body td { border: 1px solid #000; padding: 6px; text-align: center; }
        .content-body th { background: #f2f2f2; }

        .page-num { position: absolute; bottom: 15px; width: 100%; text-align: center; font-weight: bold; font-size: 14px; }

        .btn-run { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-file { width: 100%; padding: 12px; background: #34495e; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <h2>EAIM <span style="color:var(--accent)">Global Pro Engine</span></h2>
        <div style="display:flex; gap:10px; align-items:center;">
            <input type="password" id="key" placeholder="API Key" style="padding:6px;">
            <div id="dot" style="width:10px; height:10px; border-radius:50%; background:#ccc;"></div>
        </div>
    </div>

    <div class="main-layout">
        <div class="config-panel">
            <div class="group-title">용지 및 여백 (mm)</div>
            <div class="input-row"><label>위+머리말</label><div><input type="number" id="mT" value="20">+<input type="number" id="mH" value="15"></div></div>
            <div class="input-row"><label>좌|우 여백</label><div><input type="number" id="mL" value="30">|<input type="number" id="mR" value="30"></div></div>
            <div class="input-row"><label>아래+꼬리말</label><div><input type="number" id="mB" value="15">+<input type="number" id="mF" value="15"></div></div>
            
            <div class="group-title">글자 설정</div>
            <div class="input-row"><label>글자 크기(px)</label><input type="number" id="fS" value="15" oninput="updateLayout()"></div>

            <button class="btn-run" id="runBtn" onclick="runAI()">2.5-Flash 분석/교정 시작</button>
            <button class="btn-run" style="background:#2ecc71" onclick="exportPDF()">💾 PDF 전체 저장</button>
            <input type="file" id="fileIn" style="display:none;" onchange="handleFile(this.files[0])">
            <button class="btn-file" onclick="document.getElementById('fileIn').click()">📁 원고 불러오기 (PDF/TXT)</button>
        </div>

        <div style="border:2px solid #ddd; border-radius:12px; background:#fff;">
            <textarea id="input" style="width:100%; height:800px; border:none; padding:15px; resize:none;" placeholder="원고를 넣어주세요."></textarea>
        </div>

        <div class="preview-zone" id="previewZone">
            <div id="pageContainer">
                <div class="paper" id="paper1">
                    <div id="output" class="content-body" style="padding: 35mm 30mm 30mm 30mm;">분석 결과가 여기에 표시됩니다.</div>
                    <div class="page-num">- 1 -</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.worker.min.js';

    function updateLayout() {
        const paper = document.querySelector('.paper');
        const output = document.getElementById('output');
        const fs = document.getElementById('fS').value;
        const mt = parseFloat(document.getElementById('mT').value) + parseFloat(document.getElementById('mH').value);
        const mb = parseFloat(document.getElementById('mB').value) + parseFloat(document.getElementById('mF').value);
        const ml = document.getElementById('mL').value;
        const mr = document.getElementById('mR').value;

        paper.style.width = "210mm"; paper.style.height = "297mm"; // A4 고정
        output.style.padding = `${mt}mm ${mr}mm ${mb}mm ${ml}mm`;
        output.style.fontSize = `${fs}px`;
    }

    async function handleFile(file) {
        if (!file) return;
        if (file.type === "application/pdf") {
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjs.getDocument({data: new Uint8Array(this.result)}).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ") + "\n\n";
                }
                document.getElementById('input').value = text;
            };
            reader.readAsArrayBuffer(file);
        } else {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('input').value = e.target.result;
            reader.readAsText(file);
        }
    }

    async function runAI() {
        const k = document.getElementById('key').value;
        const t = document.getElementById('input').value;
        if(!k) return alert("키를 입력하세요.");
        const out = document.getElementById('output');
        out.innerText = "2.5-Flash 엔진이 정밀 분석 중...";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    contents: [{parts: [{text: `너는 글로벌 전문 편집장이야. 다음 원고를 분석하고 표가 있다면 HTML <table> 태그를 써서 테두리가 있는 표로 만들어줘. \n\n원고: ${t}`}]}]
                })
            });
            const data = await res.json();
            const resultHTML = data.candidates[0].content.parts[0].text.replace(/```html|```/g, "");
            out.innerHTML = resultHTML;
            document.getElementById('dot').style.background = "#2ecc71";
            updateLayout();
        } catch(e) { alert("엔진 오류"); }
    }

    function exportPDF() {
        const element = document.getElementById('pageContainer');
        const papers = document.querySelectorAll('.paper');
        papers.forEach(p => p.style.transform = "none"); // 저장 시 2.5D 해제

        const opt = {
            margin: 0,
            filename: 'EAIM_Final_Report.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            papers.forEach(p => p.style.transform = "rotateY(10deg)");
        });
    }
    updateLayout();
</script>
</body>
</html>
