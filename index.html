<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EAIM AI Publishing Engine (2.5-Flash)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f5f6fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 95%; max-width: 1250px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        
        .api-config { background: #fff9db; padding: 12px 20px; border-radius: 8px; border: 1px solid #fab005; display: flex; gap: 12px; align-items: center; }
        input[type="password"] { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 280px; }
        .btn-verify { background: #fab005; color: #856404; border: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .status-on { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }

        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 10px; }
        
        .drop-zone { width: 100%; height: 550px; border: 2px dashed #cbd5e0; border-radius: 12px; position: relative; transition: 0.3s; background: #fff; }
        .drop-zone.over { border-color: var(--accent); background: #e7f5ff; }
        textarea { width: 100%; height: 100%; padding: 20px; border: none; background: transparent; font-size: 15px; line-height: 1.7; box-sizing: border-box; resize: none; z-index: 2; position: relative; }
        .drop-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #a0aec0; text-align: center; pointer-events: none; z-index: 1; }

        .preview-zone { height: 550px; background: #1a1a1a; border-radius: 12px; position: relative; overflow: hidden; perspective: 1500px; }
        .layer { position: absolute; transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); padding: 30px; box-sizing: border-box; }
        .layer-paper { background: white; z-index: 1; width: 85%; height: 92%; top: 4%; left: 7.5%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .layer-content { z-index: 3; width: 75%; top: 8%; left: 12.5%; color: #333; font-size: 14px; line-height: 1.8; white-space: pre-wrap; overflow-y: auto; height: 82%; }
        
        .button-group { margin-top: 30px; display: flex; gap: 15px; justify-content: center; align-items: center; }
        button { padding: 14px 40px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; border: none; }
        .btn-file { background: #edf2f7; color: #4a5568; border: 1px solid #cbd5e0; padding: 14px 25px; display: inline-block; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 26px; color: var(--primary);">EAIM AI Publishing Engine</h1>
            <p style="margin:5px 0 0; color: #7f8c8d;">2.5-Flash 지능형 PDF 로더 & 편집 엔진</p>
        </div>
        <div class="api-config">
            <div id="statusDot" class="status-dot"></div>
            <input type="password" id="apiKey" placeholder="Gemini API 키를 입력하세요">
            <button class="btn-verify" onclick="verifyKey()">키 확인</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="drop-zone" id="dropZone">
            <div class="drop-label" id="dropLabel">
                텍스트나 PDF 파일을 여기에 끌어넣으세요<br>(HWP는 PDF로 변환 후 넣어주세요)
            </div>
            <textarea id="rawInput"></textarea>
        </div>

        <div class="preview-zone">
            <div class="layer layer-paper" id="p-bg"></div>
            <div class="layer layer-content" id="p-text">문서를 불러온 후 '분석' 버튼을 눌러주세요.</div>
        </div>
    </div>

    <div class="button-group">
        <label class="btn-file" for="fileInput">📁 문서 첨부 (PDF/TXT)</label>
        <input type="file" id="fileInput" accept=".txt,.pdf" onchange="handleFileSelect(event)">
        <button id="runBtn" class="btn-main" onclick="processDocument()" disabled>원고 정밀 분석 가동 (2.5-Flash)</button>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    
    let isVerified = false;
    const dropZone = document.getElementById('dropZone');
    const rawInput = document.getElementById('rawInput');
    const dropLabel = document.getElementById('dropLabel');

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('over'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('over'); });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('over');
        handleFile(e.dataTransfer.files[0]);
    });

    function handleFileSelect(event) {
        handleFile(event.target.files[0]);
    }

    async function handleFile(file) {
        if (!file) return;
        
        if (file.type === "application/pdf") {
            extractPdfText(file);
        } else {
            const reader = new FileReader();
            reader.onload = (e) => {
                rawInput.value = e.target.result;
                dropLabel.style.display = 'none';
            };
            reader.readAsText(file);
        }
    }

            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let fullText = '';
            
            document.getElementById('p-text').innerText = "PDF에서 텍스트 추출 중... (" + pdf.numPages + "페이지)";

                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + '\n\n';
            }
