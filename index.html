<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EAIM AI Publishing Engine (2.5-Flash)</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f5f6fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 95%; max-width: 1200px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .api-config { background: #fff9db; padding: 12px 20px; border-radius: 8px; border: 1px solid #fab005; display: flex; gap: 12px; align-items: center; }
        input[type="password"] { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 280px; font-size: 14px; }
        .btn-verify { background: #fab005; color: #856404; border: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-verify:hover { background: #f0a000; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .status-on { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 10px; }
        textarea { width: 100%; height: 520px; padding: 20px; border: 1px solid #e1e8ed; border-radius: 12px; font-size: 15px; line-height: 1.7; box-sizing: border-box; resize: none; }
        .preview-zone { height: 520px; background: #1a1a1a; border-radius: 12px; position: relative; overflow: hidden; perspective: 1500px; }
        .layer { position: absolute; transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); padding: 30px; box-sizing: border-box; }
        .layer-paper { background: white; z-index: 1; width: 85%; height: 92%; top: 4%; left: 7.5%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .layer-content { z-index: 3; width: 75%; top: 8%; left: 12.5%; color: #333; font-size: 14px; line-height: 1.8; white-space: pre-wrap; overflow-y: auto; height: 82%; }
        .button-group { margin-top: 30px; display: flex; gap: 15px; justify-content: center; }
        button { padding: 14px 40px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; border: none; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 26px; color: var(--primary);">EAIM AI Publishing Engine</h1>
            <p style="margin:5px 0 0; color: #7f8c8d;">지능형 원고 분석 및 2.5D 레이아웃 (2.5-Flash Edition)</p>
        </div>
        <div class="api-config">
            <div id="statusDot" class="status-dot"></div>
            <input type="password" id="apiKey" placeholder="Gemini API 키를 입력하세요">
            <button class="btn-verify" onclick="verifyKey()">키 확인</button>
        </div>
    </div>

    <div class="main-layout">
        <textarea id="rawInput" placeholder="교육자료전 설명서 원고를 이곳에 입력하세요."></textarea>
        <div class="preview-zone">
            <div class="layer layer-paper" id="p-bg"></div>
            <div class="layer layer-content" id="p-text">API 키 확인 후 '분석' 버튼을 누르면 정밀 교정이 시작됩니다.</div>
        </div>
    </div>

    <div class="button-group">
        <button id="runBtn" class="btn-main" onclick="processDocument()" disabled>원고 정밀 분석 및 2.5D 생성</button>
    </div>
</div>

<script>
    let isVerified = false;

    // 1. [수정됨] 2.5-Flash 모델로 키 유효성 확인
    async function verifyKey() {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey) return alert("키를 먼저 입력해주세요.");

        try {
            // 성애님의 요청대로 검증 단계도 gemini-2.5-flash 엔진을 사용합니다.
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
            });
            
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            isVerified = true;
            document.getElementById('statusDot').classList.add('status-on');
            document.getElementById('runBtn').disabled = false;
            alert("2.5-Flash 엔진 연결 성공! 이제 원고 분석이 가능합니다.");
        } catch (e) {
            alert("연결 실패: " + e.message);
            isVerified = false;
            document.getElementById('statusDot').classList.remove('status-on');
            document.getElementById('runBtn').disabled = true;
        }
    }

    // 2. 2.5-Flash 지능형 분석 엔진
    async function processDocument() {
        if(!isVerified) return alert("키 확인을 먼저 완료해주세요.");
        
        const apiKey = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('rawInput').value;
        if (!text) return alert("원고를 입력해주세요.");

        document.getElementById('p-text').innerText = "성애님의 2.5-Flash 엔진이 정밀 분석 중입니다...";

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ text: `너는 교육자료전 전문 편집장이야. 다음 원고의 오타, 띄어쓰기를 완벽하게 교정하고 가독성을 높여줘: \n\n${text}` }] 
                    }]
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const correctedText = data.candidates[0].content.parts[0].text;
            document.getElementById('p-text').innerText = correctedText;
            
            // 시각적 입체 효과 적용
            document.getElementById('p-bg').style.transform = "rotateY(10deg) rotateX(2deg) translateZ(-30px)";
            document.getElementById('p-text').style.transform = "translateZ(50px)";
            
            alert("2.5-Flash 분석 및 레이아웃 생성이 완료되었습니다!");

        } catch (error) {
            alert("분석 오류: " + error.message);
            document.getElementById('p-text').innerText = "오류 발생: 모델 명칭 또는 키를 확인해 주세요.";
        }
    }
</script>

</body>
</html>
