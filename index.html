<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EAIM AI Engine (2.5-Flash)</title>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 95%; max-width: 1200px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .api-config { background: #fff9db; padding: 10px; border-radius: 8px; display: flex; gap: 10px; align-items: center; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; }
        .status-on { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .drop-zone { height: 500px; border: 3px dashed #ddd; border-radius: 10px; position: relative; }
        textarea { width: 100%; height: 100%; border: none; padding: 15px; box-sizing: border-box; resize: none; font-size: 14px; background: transparent; }
        .preview-zone { height: 500px; background: #111; border-radius: 10px; color: #fff; padding: 20px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; border: 1px solid #333; }
        .btn-primary { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2>EAIM Engine 2.5-Flash</h2>
        <div class="api-config">
            <div id="dot" class="status-dot"></div>
            <input type="password" id="key" placeholder="API KEY">
            <button onclick="checkKey()">연결 확인</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="drop-zone">
            <textarea id="input" placeholder="여기에 파일을 던지거나 글을 쓰세요."></textarea>
        </div>
        <div id="output" class="preview-zone">결과가 여기에 표시됩니다.</div>
    </div>

    <div class="btn-group">
        <input type="file" id="file" accept=".txt,.pdf" style="display:none" onchange="loadFile(this)">
        <button onclick="document.getElementById('file').click()">📁 파일 첨부</button>
        <button id="run" class="btn-primary" onclick="runAI()" disabled>2.5-Flash 분석 시작</button>
    </div>
</div>

<script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.worker.min.js';

    let verified = false;

    // 1. 키 확인 (성애님 전용 2.5-Flash 모델)
    async function checkKey() {
        const k = document.getElementById('key').value.trim();
        if(!k) return alert("키를 입력하세요.");
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: "hi"}]}]})
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            verified = true;
            document.getElementById('dot').className = 'status-dot status-on';
            document.getElementById('run').disabled = false;
            alert("2.5-Flash 엔진 연결 성공!");
        } catch(e) { alert("연결 실패: " + e.message); }
    }

    // 2. 파일 로드 (PDF/TXT)
    async function loadFile(input) {
        const file = input.files[0];
        if(!file) return;
        if(file.type === "application/pdf") {
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjs.getDocument({data: new Uint8Array(this.result)}).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ") + "\n\n";
                }
                document.getElementById('input').value = text;
            };
            reader.readAsArrayBuffer(file);
        } else {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('input').value = e.target.result;
            reader.readAsText(file);
        }
    }

    // 3. AI 분석 (2.5-Flash 고정)
    async function runAI() {
        const k = document.getElementById('key').value.trim();
        const t = document.getElementById('input').value;
        if(!t) return alert("내용이 없습니다.");
        document.getElementById('output').innerText = "2.5-Flash 분석 중...";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: `교정해줘: \n${t}`}]}]})
            });
            const data = await res.json();
            document.getElementById('output').innerText = data.candidates[0].content.parts[0].text;
        } catch(e) { alert(e.message); }
    }
</script>
</body>
</html>
